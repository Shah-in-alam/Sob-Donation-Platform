<header class="topbar">
  <a class="brand" routerLink="/">
    <img src="sob-logo.png" alt="Special Olympics Belgium" class="brand-logo" />
    <span class="brand-text">Supporters</span>
  </a>
  <nav>
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    @if (auth.isAuthenticated()) {
      <a routerLink="/news" routerLinkActive="active">News</a>
      <a routerLink="/events" routerLinkActive="active">Events</a>
      <a routerLink="/impact" routerLinkActive="active">Impact</a>
      <button type="button" class="link-btn" (click)="logout()">Log out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Log in</a>
      <a routerLink="/register" class="btn-primary nav-cta">Become a supporter</a>
    }
  </nav>
</header>

<main class="content">
  <router-outlet />
</main>

@if (!auth.isAuthenticated()) {
  <button class="chat-fab" aria-label="Chat with us" onclick="window.open('mailto:info@special-olympics.be','_blank')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Chat</span>
  </button>
} @else if (showSupport()) {
  <a
    [routerLink]="supportLink()"
    class="support-fab"
    aria-label="Become a supporter"
    >Support</a
  >
}
