<form class="payment-box" [formGroup]="form" (ngSubmit)="pay()">

  <p class="demo-note">Demo checkout — no real payment is processed.</p>

  @if (error()) {
    <div class="alert">{{ error() }}</div>
  }

  <label class="field">
    Monthly contribution
    <div class="amount-wrap">
      <span class="currency">€</span>
      <input
        type="number"
        formControlName="amount"
        min="1"
        step="1"
        inputmode="numeric"
        class="amount-input"
      />
      <span class="per-month">/ month</span>
    </div>
    @if (form.controls.amount.invalid && form.controls.amount.touched) {
      <span class="field-error">Please enter a valid amount.</span>
    }
  </label>

  <label class="field">
    Cardholder name
    <input type="text" formControlName="cardName" placeholder="Name on card" autocomplete="cc-name" />
  </label>

  <label class="field">
    Card number
    <input type="text" formControlName="cardNumber" placeholder="4242 4242 4242 4242" inputmode="numeric" autocomplete="cc-number" />
  </label>

  <div class="row">
    <label class="field">
      Expiry
      <input type="text" formControlName="expiry" placeholder="MM/YY" autocomplete="cc-exp" />
    </label>
    <label class="field">
      CVC
      <input type="text" formControlName="cvc" placeholder="123" inputmode="numeric" autocomplete="cc-csc" />
    </label>
  </div>

  <button type="submit" class="btn-primary pay-btn" [disabled]="processing()">
    {{ processing() ? 'Processing…' : 'Pay €' + amount + ' / month' }}
  </button>

  <p class="secure">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Secured payment
  </p>

</form>
